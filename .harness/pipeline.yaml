pipeline:
  name: FullStackDeploy
  identifier: FullStackDeploy
  projectIdentifier: Default_Project
  orgIdentifier: default
  stages:
    - stage:
        name: Infrastructure
        identifier: Infrastructure
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: TerraformPlan
                  name: TF Plan
                  spec:
                    configuration:
                      type: Inline
                      spec:
                        workingDirectory: terraform
    - stage:
        name: Deploy_Backend
        identifier: Deploy_Backend
        type: Deployment
        spec:
          serviceConfig:
            serviceRef: backend_service
          infrastructure:
            environmentRef: prod_env
            infrastructureDefinition:
              type: AwsEcs
              spec:
                cluster: enterprise-app-cluster