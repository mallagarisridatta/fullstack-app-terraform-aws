version: 0.2
phases:
  install:
    commands:
      - curl -s -qL -o terraform.zip https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip
      - unzip terraform.zip
      - mv terraform /usr/local/bin/
  build:
    commands:
      - cd terraform
      - terraform init
      - terraform apply -auto-approve